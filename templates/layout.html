<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardio Health Predictor</title>
    <!-- Tailwind CSS for clean, modern utility classes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        medical: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            200: '#99f6e4',
                            300: '#5eead4',
                            400: '#2dd4bf',
                            500: '#14b8a6',
                            600: '#0d9488',
                            700: '#0f766e',
                            800: '#115e59',
                            900: '#134e4a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f8fafc;
            /* Very light cool gray */
            color: #334155;
            /* Slate 700 for soft but readable text */
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }

        .clean-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #f1f5f9;
        }

        /* Hide scrollbar for clean look in some containers if needed */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body class="antialiased min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="glass-nav sticky top-0 z-50 w-full transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex-shrink-0 flex items-center">
                    <a href="/" class="flex items-center gap-2 group">
                        <div
                            class="w-10 h-10 bg-medical-50 text-medical-600 rounded-xl flex items-center justify-center group-hover:bg-medical-100 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 7.5v8.5m-3-4.5h6" />
                            </svg>
                        </div>
                        <span class="font-bold text-xl text-slate-800 tracking-tight">Cardio<span
                                class="text-medical-600 font-light">Predict</span></span>
                    </a>
                </div>

                <div class="hidden md:flex items-center space-x-8">
                    <a href="/"
                        class="text-slate-500 hover:text-medical-600 font-medium transition-colors {% if request.path == '/' %}text-medical-600{% endif %}">Home</a>
                    <a href="/theory"
                        class="text-slate-500 hover:text-medical-600 font-medium transition-colors {% if request.path == '/theory' %}text-medical-600{% endif %}">Models
                        Info</a>
                    <a href="/analysis"
                        class="text-slate-500 hover:text-medical-600 font-medium transition-colors {% if request.path == '/analysis' %}text-medical-600{% endif %}">Evaluation</a>

                    <a href="/predict_page"
                        class="bg-medical-600 hover:bg-medical-700 text-white px-6 py-2.5 rounded-xl font-medium shadow-sm shadow-medical-500/30 transition-all transform hover:-translate-y-0.5">
                        New Assessment
                    </a>
                </div>

                <!-- Mobile menu button (omitting full implementation for brevity, assuming desktop first focus) -->
                <div class="md:hidden flex items-center">
                    <!-- Hamburger icon here if needed -->
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow w-full">
        {% block content %}{% endblock %}
    </main>

    <!-- Simple, Clean Footer -->
    <footer class="bg-white border-t border-slate-100 py-12 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center flex flex-col items-center">
            <div class="flex items-center gap-2 mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-medical-500" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                </svg>
                <span class="font-semibold text-slate-700">Cardio Predict AI</span>
            </div>
            <p class="text-slate-400 text-sm max-w-md mx-auto mb-6">Empowering healthcare decisions with machine
                learning insights.</p>
            <div class="flex space-x-6 text-sm text-slate-400">
                <a href="#" class="hover:text-medical-600 transition-colors">Privacy</a>
                <a href="#" class="hover:text-medical-600 transition-colors">Terms</a>
                <a href="#" class="hover:text-medical-600 transition-colors">Contact</a>
            </div>
            <p class="text-xs text-slate-300 mt-8">&copy; {{ now|default('2026') }} Cardio Predict. All rights reserved.
            </p>
        </div>
    </footer>

</body>

</html>
